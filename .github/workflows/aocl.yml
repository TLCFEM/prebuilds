env:
  ARCHIVE: ''
jobs:
  aocl:
    runs-on: ${{ matrix.os }}
    steps:
      - name: Clone
        uses: actions/checkout@v6
        with:
          ref: AOCL-5.3
          repository: amd/aocl
      - name: Patch
        run: |
          export ARCHIVE=aocl-${{ matrix.os }}.tar.gz
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"
          cmake --preset aocl-linux-make-lp-ga-gcc-config -DBUILD_SHARED_LIBS=OFF -DENABLE_AOCL_COMPRESSION=OFF -DENABLE_AOCL_SPARSE=OFF -DENABLE_AOCL_CRYPTO=OFF -DENABLE_AOCL_DA=OFF -DENABLE_AOCL_LIBMEM=OFF -DCMAKE_INSTALL_PREFIX=aocl-install --fresh
          cmake --build build --config Release --target install --parallel
          tar cvzf $ARCHIVE -C aocl-install .
      - name: Release
        uses: svenstaro/upload-release-action@v2
        with:
          asset_name: ${{ env.ARCHIVE }}
          file: ${{ env.ARCHIVE }}
          overwrite: true
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: latest
    strategy:
      matrix:
        os:
          - ubuntu-22.04
          - ubuntu-24.04
name: aocl
'on': workflow_dispatch
