env:
  ARCHIVE: ""
jobs:
  tbb:
    runs-on: ${{ matrix.os }}
    steps:
      - name: Compile
        run: |
          if [[ "${{ matrix.os }}" == macos-* ]]; then
            if [[ "${{ matrix.os }}" == "macos-26-large" || "${{ matrix.os }}" == "macos-26-xlarge" ]]; then
              export CC=$(brew --prefix llvm@20)/bin/clang
              export CXX=$(brew --prefix llvm@20)/bin/clang++
            elif [[ "${{ matrix.os }}" == "macos-15-large" || "${{ matrix.os }}" == "macos-15-xlarge" ]]; then
              export CC=$(brew --prefix llvm@18)/bin/clang
              export CXX=$(brew --prefix llvm@18)/bin/clang++
            else
              export CC=$(brew --prefix llvm@15)/bin/clang
              export CXX=$(brew --prefix llvm@15)/bin/clang++
            fi
          fi
          export ARCHIVE=tbb-${{ matrix.version}}-${{ matrix.os }}.tar.gz
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"
          git clone --depth 1 --branch ${{ matrix.version}} https://github.com/uxlfoundation/oneTBB.git
          mkdir tbb-install && mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DTBB_TEST=OFF -DCMAKE_INSTALL_PREFIX=../tbb-install ../oneTBB
          cmake --build . --target install --config Release --parallel 4
          cd .. && tar czf $ARCHIVE tbb-install
      - name: Release
        uses: svenstaro/upload-release-action@v2
        with:
          asset_name: ${{ env.ARCHIVE }}
          file: ${{ env.ARCHIVE }}
          overwrite: true
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: latest
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - ubuntu-22.04-arm
          - ubuntu-24.04
          - ubuntu-24.04-arm
          - macos-15-large
          - macos-15-xlarge
          - macos-26-large
          - macos-26-xlarge
        version:
          - v2023.1.0
          - v2023.0.0
name: tbb
"on": workflow_dispatch
