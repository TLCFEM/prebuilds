name: vtk
on: workflow_dispatch
env:
  major: "9"
  minor: "6"
  patch: "1"
  version: "9.6.1"
jobs:
  linux:
    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-22.04-arm, ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Compile
        run: |
          sudo apt-get install libglvnd-dev gcc gfortran g++
          wget -q https://www.vtk.org/files/release/${{ env.major }}.${{ env.minor }}/VTK-${{ env.version }}.tar.gz
          tar xf VTK-${{ env.version }}.tar.gz && rm VTK-${{ env.version }}.tar.gz
          mkdir VTK-build && cd VTK-build
          cmake -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF -DCMAKE_INSTALL_PREFIX=../VTK-out ../VTK-${{ env.version }}
          cmake --build . --target install --config Release --parallel 4
          cd ../VTK-out
          tar cvzf ../VTK-${{ env.version }}-${{ matrix.os }}.tar.gz ./*
      - name: Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: VTK-${{ env.version }}-${{ matrix.os }}.tar.gz
          asset_name: VTK-${{ env.version }}-${{ matrix.os }}.tar.gz
          tag: latest
          overwrite: true
  macos:
    strategy:
      matrix:
        os: [macos-14-large, macos-15-large, macos-26-large, macos-14-xlarge, macos-15-xlarge, macos-26-xlarge]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Compile
        run: |
          export FC=gfortran-13
          brew install glfw glew
          wget -q https://www.vtk.org/files/release/${{ env.major }}.${{ env.minor }}/VTK-${{ env.version }}.tar.gz
          tar xf VTK-${{ env.version }}.tar.gz && rm VTK-${{ env.version }}.tar.gz
          mkdir VTK-build && cd VTK-build
          cmake -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF -DCMAKE_INSTALL_PREFIX=../VTK-out ../VTK-${{ env.version }}
          cmake --build . --target install --config Release --parallel 4
          cd ../VTK-out
          tar cvzf ../VTK-${{ env.version }}-${{ matrix.os }}.tar.gz ./*
      - name: Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: VTK-${{ env.version }}-${{ matrix.os }}.tar.gz
          asset_name: VTK-${{ env.version }}-${{ matrix.os }}.tar.gz
          tag: latest
          overwrite: true
  win-msvc:
    runs-on: windows-2025
    steps:
      - name: Compile
        run: |
          C:/msys64/usr/bin/wget.exe -q https://www.vtk.org/files/release/${{ env.major }}.${{ env.minor }}/VTK-${{ env.version }}.tar.gz
          tar xf VTK-${{ env.version }}.tar.gz && del VTK-${{ env.version }}.tar.gz
          mkdir VTK-build && mkdir VTK-out && cd VTK-build
          cmake -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF -DCMAKE_INSTALL_PREFIX=D:/a/prebuilds/prebuilds/VTK-out ../VTK-${{ env.version }}
          cmake --build . --target install --config Release --parallel 4
          cd ../VTK-out
          7z a ../VTK-${{ env.version }}-win.7z ./*
      - name: Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: VTK-${{ env.version }}-win.7z
          asset_name: VTK-${{ env.version }}-win.7z
          tag: latest
          overwrite: true
  win-gcc:
    runs-on: windows-2025
    steps:
      - name: Compile
        run: |
          C:/msys64/usr/bin/wget.exe -q https://github.com/brechtsanders/winlibs_mingw/releases/download/13.3.0posix-11.0.1-ucrt-r1/winlibs-x86_64-posix-seh-gcc-13.3.0-mingw-w64ucrt-11.0.1-r1.7z
          7z x winlibs-x86_64-posix-seh-gcc-13.3.0-mingw-w64ucrt-11.0.1-r1.7z
          C:/msys64/usr/bin/wget.exe -q https://www.vtk.org/files/release/${{ env.major }}.${{ env.minor }}/VTK-${{ env.version }}.tar.gz
          tar xf VTK-${{ env.version }}.tar.gz && del VTK-${{ env.version }}.tar.gz
          mkdir VTK-build && mkdir VTK-out && cd VTK-build
          cmake -G "MinGW Makefiles" `
          -DBUILD_SHARED_LIBS=OFF `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_CXX_FLAGS="-D_POSIX_THREAD_SAFE_FUNCTIONS" `
          -DCMAKE_C_COMPILER=D:/a/prebuilds/prebuilds/mingw64/bin/gcc.exe `
          -DCMAKE_CXX_COMPILER=D:/a/prebuilds/prebuilds/mingw64/bin/g++.exe `
          -DCMAKE_Fortran_COMPILER=D:/a/prebuilds/prebuilds/mingw64/bin/gfortran.exe `
          -DCMAKE_INSTALL_PREFIX=D:/a/prebuilds/prebuilds/VTK-out `
          ../VTK-${{ env.version }}
          cmake --build . --target install --config Release --parallel 4
          cd ../VTK-out
          7z a ../VTK-${{ env.version }}-win-gcc.7z ./*
      - name: Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: VTK-${{ env.version }}-win-gcc.7z
          asset_name: VTK-${{ env.version }}-win-gcc.7z
          tag: latest
          overwrite: true
