jobs:
  mimalloc-win:
    runs-on: windows-2025
    steps:
      - if: matrix.archive == 'mimalloc-win-gcc.7z'
        name: GCC
        run: |
          C:/msys64/usr/bin/wget.exe -q https://github.com/brechtsanders/winlibs_mingw/releases/download/15.3.0posix-14.0.0-ucrt-r1/winlibs-x86_64-posix-seh-gcc-15.3.0-mingw-w64ucrt-14.0.0-r1.7z
          7z x winlibs-x86_64-posix-seh-gcc-15.3.0-mingw-w64ucrt-14.0.0-r1.7z
      - name: Compile
        run: |
          git clone --depth 1 --branch v3.4.3 https://github.com/microsoft/mimalloc.git
          mkdir mimalloc-install && mkdir build && cd build
          if [ ${{ matrix.archive }} == 'mimalloc-win-gcc.7z' ]; then
            export CC=D:/a/prebuilds/prebuilds/mingw64/bin/gcc.exe && \
            export CXX=D:/a/prebuilds/prebuilds/mingw64/bin/g++.exe && \
            export FC=D:/a/prebuilds/prebuilds/mingw64/bin/gfortran.exe && \
            cmake -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=../mimalloc-install ../mimalloc
          else
            cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=../mimalloc-install ../mimalloc
          fi
          cmake --build . --target install --config Release --parallel 4
          cd ../mimalloc-install && 7z a ../${{ matrix.archive }} ./*
        shell: bash
      - name: Release
        uses: svenstaro/upload-release-action@v2
        with:
          asset_name: ${{ matrix.archive }}
          file: ${{ matrix.archive }}
          overwrite: true
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: latest
    strategy:
      matrix:
        archive:
          - mimalloc-win.7z
          - mimalloc-win-gcc.7z
name: mimalloc-win
'on': workflow_dispatch
