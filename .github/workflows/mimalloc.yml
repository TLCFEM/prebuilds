env:
  ARCHIVE: ''
jobs:
  mimalloc:
    runs-on: ${{ matrix.os }}
    steps:
      - name: Compile
        run: |
          export ARCHIVE=mimalloc-${{ matrix.os }}.tar.gz
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"
          git clone --depth 1 --branch v3.4.3 https://github.com/microsoft/mimalloc.git
          mkdir mimalloc-install && mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=../mimalloc-install ../mimalloc
          cmake --build . --target install --config Release --parallel 4
          cd ..
          tar cvzf $ARCHIVE -C mimalloc-install .
      - name: Release
        uses: svenstaro/upload-release-action@v2
        with:
          asset_name: ${{ env.ARCHIVE }}
          file: ${{ env.ARCHIVE }}
          overwrite: true
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: latest
    strategy:
      matrix:
        os:
          - macos-15-large
          - macos-15-xlarge
          - macos-26-large
          - macos-26-xlarge
          - ubuntu-22.04-arm
          - ubuntu-22.04
          - ubuntu-24.04-arm
          - ubuntu-24.04
name: mimalloc
'on': workflow_dispatch
