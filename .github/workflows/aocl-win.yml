env:
  ARCHIVE: ''
jobs:
  aocl-win:
    runs-on: windows-2025
    steps:
      - name: Clone
        uses: actions/checkout@v7
        with:
          ref: AOCL-5.3
          repository: amd/aocl
      - name: Patch
        run: |
          # C:/msys64/usr/bin/wget.exe -q https://github.com/brechtsanders/winlibs_mingw/releases/download/15.3.0posix-14.0.0-ucrt-r1/winlibs-x86_64-posix-seh-gcc-15.3.0-mingw-w64ucrt-14.0.0-r1.7z
          # 7z x winlibs-x86_64-posix-seh-gcc-15.3.0-mingw-w64ucrt-14.0.0-r1.7z
          export ARCHIVE=aocl-win-clang.tar.gz
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"
          cmake --preset aocl-win-ninja-lp-ga-config -DBUILD_SHARED_LIBS=OFF -DENABLE_AOCL_COMPRESSION=OFF -DENABLE_AOCL_SPARSE=OFF -DENABLE_AOCL_CRYPTO=OFF -DENABLE_AOCL_DA=OFF -DENABLE_AOCL_LIBMEM=OFF -DCMAKE_INSTALL_PREFIX=aocl-install --fresh
          cmake --build build --config Release --target install --parallel
          tar cvzf $ARCHIVE -C aocl-install .
        shell: bash
      - name: Release
        uses: svenstaro/upload-release-action@v2
        with:
          asset_name: ${{ env.ARCHIVE }}
          file: ${{ env.ARCHIVE }}
          overwrite: true
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: latest
name: aocl-win
'on': workflow_dispatch
